name: Prod Model Deployment for mlops-jetstar
'on':
  workflow_dispatch:
    inputs:
      modelUri:
        type: string
        description: URI of model to deploy, in the format models:/<model-name>/<version-id>
        required: true
env:
  DATABRICKS_HOST: https://cse2.cloud.databricks.com
  NODE_TYPE_ID: i3.xlarge
  DATABRICKS_TOKEN: ${{ secrets.PROD_WORKSPACE_TOKEN }}
jobs:
  prod:
    runs-on: ubuntu-latest
    environment: prod
    steps:
    - name: Checkout repo
      uses: actions/checkout@v3
    - name: Deploy model
      env:
        MLFLOW_TRACKING_URI: databricks
      run: 'pip install mlflow

        python steps/deploy.py "${{ github.event.inputs.modelUri }}" "prod"

        '
